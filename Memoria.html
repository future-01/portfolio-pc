  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────────────────
       Memoria — Sand palette tokens
    ───────────────────────────────────────────────────── */
    :root, [data-theme="sand"] {
      --bg:        #f5efe6;
      --bg-elev:   #fbf7f0;
      --bg-soft:   #ece4d4;
      --line:      #e2d6c1;
      --line-strong:#cbb89a;
      --ink:       #2a221a;
      --ink-2:     #5b4d3d;
      --ink-3:     #8a7964;
      --accent:    #7a4f2c;
      --accent-soft:#b88a5e;
      --gold:      #b89265;
      --shadow-1:  0 1px 2px rgba(74,55,35,.06), 0 2px 8px rgba(74,55,35,.05);
      --shadow-2:  0 6px 20px rgba(74,55,35,.10), 0 2px 6px rgba(74,55,35,.06);
      --shadow-overlay: 0 12px 40px rgba(20,14,8,.45);
      --font-display: 'Cormorant Garamond', 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
      --font-serif:   'Shippori Mincho', 'Hiragino Mincho ProN', 'YuMincho', serif;
      --font-sans:    'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #ddd3c4; }
    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      color: var(--ink);
      overflow: hidden;
    }
    #root { height: 100%; }
    input, textarea { font-family: inherit; font-size: inherit; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    ::selection { background: var(--accent-soft); color: #fff; }

    .phone-screen {
      font-family: var(--font-sans);
      color: var(--ink);
      background: var(--bg);
      font-feature-settings: "palt";
      letter-spacing: .01em;
      box-shadow: 0 30px 80px rgba(40,28,18,.35), 0 8px 24px rgba(40,28,18,.20);
    }

    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; letter-spacing: .08em;
      background: rgba(184,146,101,.12);
      color: var(--accent);
      border: 1px solid rgba(184,146,101,.25);
    }
    .tag-dark {
      background: rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      border-color: rgba(255,255,255,.22);
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      height: 36px; padding: 0 14px; border-radius: 999px;
      background: var(--bg-elev); border: 1px solid var(--line);
      color: var(--ink-2); font-size: 13px;
      white-space: nowrap; cursor: pointer;
    }
    .chip.is-active { background: var(--ink); color: var(--bg-elev); border-color: var(--ink); }
    .tap { min-width: 44px; min-height: 44px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .tap:active { opacity: .7; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-enter { animation: fadeIn 240ms cubic-bezier(.2,.7,.3,1) both; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-7px); }
      40%, 80% { transform: translateX(7px); }
    }
    .shake { animation: shake 380ms ease-in-out; }

    .fab {
      position: absolute; right: 18px; bottom: 100px;
      width: 56px; height: 56px; border-radius: 999px;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 22px rgba(74,55,35,.32), 0 2px 6px rgba(74,55,35,.2);
      cursor: pointer; z-index: 30; border: none;
    }
    .fab:active { transform: scale(.94); }

    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(20,14,8,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 18px;
    }
    .modal-card {
      background: var(--bg-elev);
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-overlay);
      width: 100%; max-width: 360px;
      max-height: 86vh; overflow-y: auto;
      padding: 22px 20px;
    }
    .admin-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(180deg, #2a221a 0%, #1f1812 100%);
      color: rgba(255,255,255,.92);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      font-size: 11px; letter-spacing: .08em;
      z-index: 200;
    }

    .editable-pen {
      display: inline-flex;
      width: 20px; height: 20px;
      border-radius: 999px;
      background: rgba(184,146,101,.20);
      color: var(--accent);
      align-items: center; justify-content: center;
      margin-left: 6px; vertical-align: middle;
      cursor: pointer; flex-shrink: 0;
    }
    .editable-pen.dark {
      background: rgba(255,255,255,.18);
      color: #fff;
    }

    .text-input {
      font: inherit; color: var(--ink);
      background: rgba(255,255,255,.96);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 4px 10px;
      outline: none;
      box-shadow: var(--shadow-1);
      width: 100%;
    }
    .text-area {
      font: inherit; color: var(--ink);
      background: rgba(255,255,255,.96);
      border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 6px 10px;
      outline: none;
      box-shadow: var(--shadow-1);
      width: 100%;
      resize: vertical; min-height: 60px;
    }

    .progress-track {
      width: 100%; height: 6px;
      background: var(--line);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 200ms linear;
    }

    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 6px;
    }
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; height: 44px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; width: 100%;
      letter-spacing: .04em;
    }
    .btn-primary:active { opacity: .82; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; height: 44px;
      background: transparent; color: var(--ink-2);
      border: 1px solid var(--line-strong);
      border-radius: 12px; font-size: 13px;
      cursor: pointer; width: 100%;
    }
    .btn-secondary:active { opacity: .7; }
    .btn-danger {
      background: #b13a2a; color: #fff;
      border: none;
    }

    .longpress-menu {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: var(--bg-elev); border-top: 1px solid var(--line);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -10px 30px rgba(20,14,8,.25);
      padding: 12px 0 28px; z-index: 110;
    }
    .longpress-menu .row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px; cursor: pointer;
      font-size: 14px; color: var(--ink);
    }
    .longpress-menu .row:active { background: var(--bg-soft); }
    .longpress-menu .row.danger { color: #b13a2a; }
  </style>

// ─────────────────────────────────────────────────────────
// SEED PHOTO BUILDER (used only by initial DEFAULT_MEMORIA_CONFIG)
// ─────────────────────────────────────────────────────────
function buildSeedPhotos(albumId, count, datePrefix, desc) {
  const days = ['01','02','03','04','05'];
  const out = [];
  const prefix = datePrefix.replace('通年', '2025.06');
  for (let i = 0; i < count; i++) {
    const slot = (i % 6) + 1;
    const day = days[i % days.length];
    out.push({
      id: `${albumId}-p-${String(i+1).padStart(3,'0')}`,
      src: `project/placeholders/${albumId}-${slot}.svg`,
      date: `${prefix}.${day}`,
      caption: i === 0 ? desc : '',
    });
  }
  return out;
}

const STORAGE_KEY = 'MEMORIA_USER_DATA';
const ADMIN_KEY   = 'MEMORIA_ADMIN';
const UNLOCK_KEY  = 'MEMORIA_UNLOCKED';

// PBKDF2 (Web Crypto) — passphrase hashing helpers
const KDF_ITERATIONS = 310000;
const KDF_HASH = 'SHA-256';
const KDF_BITS = 256;

function bytesToB64(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBytes(b64) {
  const s = atob(b64);
  const out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out;
}
function randomSaltB64() {
  return bytesToB64(crypto.getRandomValues(new Uint8Array(16)));
}
async function deriveHashB64(plaintext, saltB64, iterations = KDF_ITERATIONS) {
  if (!crypto || !crypto.subtle) {
    throw new Error('Web Crypto 未対応です。HTTPS か http://localhost で開いてください。');
  }
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(plaintext), { name: 'PBKDF2' }, false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: b64ToBytes(saltB64), iterations, hash: KDF_HASH },
    baseKey, KDF_BITS);
  return bytesToB64(new Uint8Array(bits));
}
function constantTimeEq(a, b) {
  if (typeof a !== 'string' || typeof b !== 'string' || a.length !== b.length) return false;
  let r = 0;
  for (let i = 0; i < a.length; i++) r |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return r === 0;
}
async function verifyPassphrase(input, hashB64, saltB64, iterations) {
  if (!input || !hashB64 || !saltB64) return false;
  const computed = await deriveHashB64(input, saltB64, iterations || KDF_ITERATIONS);
  return constantTimeEq(computed, hashB64);
}
async function makeAuthEntry(plaintext) {
  const salt = randomSaltB64();
  const hash = await deriveHashB64(plaintext, salt);
  return { hash, salt };
}
function isWeakPassphrase(s) {
  if (!s) return false;
  const lower = s.toLowerCase();
  const weak = ['password', 'passw0rd', '12345678', '123456', 'qwerty', 'abc123', 'letmein', 'welcome'];
  return s.length < 8 || weak.includes(lower);
}

function deepClone(v) { return JSON.parse(JSON.stringify(v)); }
function isPlainObject(v) { return v && typeof v === 'object' && !Array.isArray(v); }

// Recursively merge user overrides on top of defaults.
// Arrays in user override replace defaults entirely (so editing albums works).
function mergeConfig(defaults, user) {
  if (user === null || user === undefined) return deepClone(defaults);
  if (Array.isArray(user)) return deepClone(user);
  if (!isPlainObject(user)) return user;
  const out = {};
  const keys = new Set([...Object.keys(defaults || {}), ...Object.keys(user)]);
  keys.forEach(k => {
    if (k in user && k in (defaults || {})) {
      out[k] = mergeConfig(defaults[k], user[k]);
    } else if (k in user) {
      out[k] = isPlainObject(user[k]) || Array.isArray(user[k]) ? deepClone(user[k]) : user[k];
    } else {
      out[k] = isPlainObject(defaults[k]) || Array.isArray(defaults[k]) ? deepClone(defaults[k]) : defaults[k];
    }
  });
  return out;
}

function loadStoredConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Drop legacy plaintext auth fields (pre-PBKDF2 schema) so they cannot
    // override defaults. Hashes/salts from defaults are merged back in.
    if (parsed && parsed.auth && (parsed.auth.passphrase || parsed.auth.adminPassphrase)) {
      delete parsed.auth.passphrase;
      delete parsed.auth.adminPassphrase;
    }
    return parsed;
  } catch (e) { return null; }
}
function saveStoredConfig(cfg) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch (e) {}
}

// Photo URL resolver — handles seed SVGs and Cloudinary uploads.
function imgUrl(src, size) {
  if (!src) return '';
  if (src.includes('res.cloudinary.com') && src.includes('/upload/')) {
    const w = size === 'thumb' ? 400 : (size === 'mid' ? 800 : 1400);
    return src.replace('/upload/', `/upload/w_${w},q_auto,f_auto/`);
  }
  if (src.includes('/placeholders/') && src.endsWith('.svg')) {
    if (size === 'thumb') return src;
    return src.replace('.svg', '-lg.svg');
  }
  return src;
}

function getCoverPhoto(album) {
  if (!album || !album.photos || !album.photos.length) return null;
  if (album.coverPhotoId) {
    const found = album.photos.find(p => p.id === album.coverPhotoId);
    if (found) return found;
  }
  return album.photos[0];
}
function coverUrl(album, size = 'full') {
  const p = getCoverPhoto(album);
  return p ? imgUrl(p.src, size) : '';
}

function newId(prefix) {
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`;
}
function totalPhotosOf(albums) {
  return albums.reduce((s, a) => s + (a.photos ? a.photos.length : 0), 0);
}
function todayShort() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function uploadToCloudinary(file, { cloudName, uploadPreset }, onProgress) {
  if (!cloudName || !uploadPreset) {
    throw new Error('Cloudinary 設定（クラウド名・アップロードプリセット）が必要です。');
  }
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const url = `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`;
    xhr.open('POST', url);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable && onProgress) onProgress(e.loaded / e.total);
    };
    xhr.onload = () => {
      try {
        const json = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve({ src: json.secure_url, width: json.width, height: json.height, publicId: json.public_id });
        } else {
          reject(new Error((json.error && json.error.message) || `アップロード失敗 (${xhr.status})`));
        }
      } catch (e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error('ネットワークエラー'));
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', uploadPreset);
    xhr.send(fd);
  });
}

function replaceConfigInSource(source, config) {
  const begin = '// MEMORIA_CONFIG_BEGIN';
  const end = '// MEMORIA_CONFIG_END';
  const beginIdx = source.indexOf(begin);
  const endIdx = source.indexOf(end);
  if (beginIdx < 0 || endIdx < 0) {
    throw new Error('CONFIG sentinels が見つかりません。');
  }
  const replacement = `${begin}\nconst DEFAULT_MEMORIA_CONFIG = ${JSON.stringify(config, null, 2)};\n${end}`;
  return source.slice(0, beginIdx) + replacement + source.slice(endIdx + end.length);
}

async function publishHTML(config) {
  if (location.protocol === 'file:') {
    throw new Error('ローカルファイル(file://)では書き出しできません。Live Server か GitHub Pages 経由でアクセスしてください。');
  }
  const res = await fetch(location.href);
  if (!res.ok) throw new Error(`ソースHTMLの取得失敗 (${res.status})`);
  const source = await res.text();
  const updated = replaceConfigInSource(source, config);
  const blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Memoria.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadJSON(name, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const ConfigContext = React.createContext(null);
const AdminContext = React.createContext({ isAdmin: false, login: () => {}, logout: () => {} });

function ConfigProvider({ children }) {
  const [config, setConfig] = React.useState(() => mergeConfig(DEFAULT_MEMORIA_CONFIG, loadStoredConfig()));

  const updateConfig = React.useCallback((updater) => {
    setConfig(prev => {
      const draft = deepClone(prev);
      const result = typeof updater === 'function' ? updater(draft) : updater;
      const next = result === undefined ? draft : result;
      saveStoredConfig(next);
      return next;
    });
  }, []);

  const replaceConfig = React.useCallback((next) => {
    saveStoredConfig(next);
    setConfig(next);
  }, []);

  const resetConfig = React.useCallback(() => {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    setConfig(deepClone(DEFAULT_MEMORIA_CONFIG));
  }, []);

  React.useEffect(() => {
    document.title = (config.site && config.site.metaTitle) || 'Memoria';
  }, [config.site]);

  return (
    <ConfigContext.Provider value={{ config, updateConfig, replaceConfig, resetConfig }}>
      {children}
    </ConfigContext.Provider>
  );
}
function useConfig() { return React.useContext(ConfigContext); }

function AdminProvider({ children }) {
  const [isAdmin, setIsAdmin] = React.useState(() => {
    try { return localStorage.getItem(ADMIN_KEY) === '1'; } catch (e) { return false; }
  });
  const login = React.useCallback(() => {
    try { localStorage.setItem(ADMIN_KEY, '1'); } catch (e) {}
    setIsAdmin(true);
  }, []);
  const logout = React.useCallback(() => {
    try { localStorage.removeItem(ADMIN_KEY); } catch (e) {}
    setIsAdmin(false);
  }, []);
  return (
    <AdminContext.Provider value={{ isAdmin, login, logout }}>
      {children}
    </AdminContext.Provider>
  );
}
function useAdmin() { return React.useContext(AdminContext); }

function useShake() {
  const [shaking, setShaking] = React.useState(false);
  const trigger = React.useCallback(() => {
    setShaking(true);
    setTimeout(() => setShaking(false), 400);
  }, []);
  return [shaking, trigger];
}

function useLongPress(onLongPress, onClick, ms = 550) {
  const timer = React.useRef(null);
  const fired = React.useRef(false);
  const start = () => {
    fired.current = false;
    if (!onLongPress) return;
    timer.current = setTimeout(() => {
      fired.current = true;
      onLongPress();
    }, ms);
  };
  const cancel = () => {
    if (timer.current) { clearTimeout(timer.current); timer.current = null; }
  };
  const click = (e) => {
    if (fired.current) { if (e && e.preventDefault) e.preventDefault(); return; }
    if (onClick) onClick(e);
  };
  return {
    onMouseDown: start, onMouseUp: cancel, onMouseLeave: cancel,
    onTouchStart: start, onTouchEnd: cancel, onTouchCancel: cancel,
    onClick: click,
  };
}

// EditableText: shows pen icon to admins, swaps to <input> on click.
function EditableText({ value, onSave, multiline = false, dark = false, placeholder = '', children }) {
  const { isAdmin } = useAdmin();
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(value == null ? '' : value);
  React.useEffect(() => { setDraft(value == null ? '' : value); }, [value]);

  if (!isAdmin) return <React.Fragment>{children != null ? children : value}</React.Fragment>;

  if (editing) {
    const commit = () => { onSave(draft); setEditing(false); };
    const cancel = () => { setDraft(value == null ? '' : value); setEditing(false); };
    return (
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, width: '100%' }}>
        {multiline ? (
          <textarea autoFocus className="text-area" value={draft}
            placeholder={placeholder}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Escape') cancel(); }}
          />
        ) : (
          <input autoFocus className="text-input" value={draft}
            placeholder={placeholder}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') cancel(); }}
          />
        )}
        <span className="tap" onClick={commit} style={{ color: 'var(--accent)', minWidth: 28, minHeight: 28, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon.Check/>
        </span>
        <span className="tap" onClick={cancel} style={{ color: 'var(--ink-3)', minWidth: 28, minHeight: 28, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon.Close/>
        </span>
      </span>
    );
  }

  return (
    <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 4, maxWidth: '100%' }}>
      <span>{children != null ? children : value}</span>
      <span className={'editable-pen' + (dark ? ' dark' : '')} onClick={(e) => { e.stopPropagation(); setEditing(true); }}>
        <Icon.Pen/>
      </span>
    </span>
  );
}

function AdminLoginModal({ onClose }) {
  const { config } = useConfig();
  const { login } = useAdmin();
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState('');
  const [shaking, shake] = useShake();
  const [verifying, setVerifying] = React.useState(false);
  const submit = async () => {
    if (verifying) return;
    setVerifying(true);
    try {
      const ok = await verifyPassphrase(pw, config.auth.adminPassphraseHash, config.auth.adminPassphraseSalt, config.auth.kdfIterations);
      if (ok) { login(); onClose(); }
      else { setErr('管理者パスワードが違います'); shake(); }
    } catch (e) {
      setErr(e.message || '認証エラー'); shake();
    } finally {
      setVerifying(false);
    }
  };
  return (
    <Modal onClose={onClose}>
      <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 18, fontWeight: 500, marginBottom: 14 }}>管理者ログイン</div>
      <div className={'form-row' + (shaking ? ' shake' : '')}>
        <label className="form-label">管理者パスワード</label>
        <input type="password" className="text-input" autoFocus value={pw} disabled={verifying}
          onChange={e => { setPw(e.target.value); setErr(''); }}
          onKeyDown={e => { if (e.key === 'Enter') submit(); }}/>
        {err && <div style={{ color: '#b13a2a', fontSize: 12, marginTop: 6 }}>{err}</div>}
      </div>
      <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
        <button className="btn-secondary" onClick={onClose} disabled={verifying}>キャンセル</button>
        <button className="btn-primary" onClick={submit} disabled={verifying}>{verifying ? '確認中…' : 'ログイン'}</button>
      </div>
      <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 14, lineHeight: 1.6 }}>
        初期パスワードはセットアップ時のメモを参照してください。<strong>初回ログイン後はすぐに強いパスワードへ変更してください。</strong>
      </div>
    </Modal>
  );
}

function PassphraseChangeModal({ kind, onClose }) {
  const { config, updateConfig } = useConfig();
  const isFamily = kind === 'family';
  const hashKey = isFamily ? 'passphraseHash' : 'adminPassphraseHash';
  const saltKey = isFamily ? 'passphraseSalt' : 'adminPassphraseSalt';
  const titleText = isFamily ? '合言葉の変更' : '管理者パスワードの変更';
  const [cur, setCur] = React.useState('');
  const [n1, setN1] = React.useState('');
  const [n2, setN2] = React.useState('');
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const weakWarn = n1 && isWeakPassphrase(n1);
  const submit = async () => {
    if (busy) return;
    setBusy(true);
    try {
      const ok = await verifyPassphrase(cur, config.auth[hashKey], config.auth[saltKey], config.auth.kdfIterations);
      if (!ok) { setErr('現在のパスワードが違います'); return; }
      if (!n1) { setErr('新しいパスワードを入力してください'); return; }
      if (n1 !== n2) { setErr('新しいパスワードが一致しません'); return; }
      if (n1.length < 6) { setErr('新しいパスワードは6文字以上にしてください'); return; }
      const entry = await makeAuthEntry(n1);
      updateConfig(d => {
        d.auth = d.auth || {};
        d.auth[hashKey] = entry.hash;
        d.auth[saltKey] = entry.salt;
        d.auth.kdfIterations = KDF_ITERATIONS;
        if (isFamily) d.auth.passphraseUpdatedAt = todayShort();
      });
      onClose();
    } catch (e) {
      setErr(e.message || '変更に失敗しました');
    } finally {
      setBusy(false);
    }
  };
  return (
    <Modal onClose={onClose}>
      <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 18, fontWeight: 500, marginBottom: 14 }}>{titleText}</div>
      <div className="form-row">
        <label className="form-label">現在のパスワード</label>
        <input type="password" className="text-input" value={cur} disabled={busy} onChange={e => { setCur(e.target.value); setErr(''); }}/>
      </div>
      <div className="form-row">
        <label className="form-label">新しいパスワード</label>
        <input type="password" className="text-input" value={n1} disabled={busy} onChange={e => { setN1(e.target.value); setErr(''); }}/>
        {weakWarn && (
          <div style={{ color: '#b1772a', fontSize: 11.5, marginTop: 6, lineHeight: 1.5 }}>
            ⚠ 弱いパスワードです。8文字以上で、辞書に載っていない語をおすすめします。
          </div>
        )}
      </div>
      <div className="form-row">
        <label className="form-label">確認</label>
        <input type="password" className="text-input" value={n2} disabled={busy} onChange={e => { setN2(e.target.value); setErr(''); }}/>
      </div>
      {err && <div style={{ color: '#b13a2a', fontSize: 12, marginBottom: 10 }}>{err}</div>}
      <div style={{ display: 'flex', gap: 10 }}>
        <button className="btn-secondary" onClick={onClose} disabled={busy}>キャンセル</button>
        <button className="btn-primary" onClick={submit} disabled={busy}>{busy ? '処理中…' : '変更'}</button>
      </div>
    </Modal>
  );
}

function AlbumEditorModal({ mode, album, onClose }) {
  const { updateConfig } = useConfig();
  const [title, setTitle] = React.useState((album && album.title) || '');
  const [subtitle, setSubtitle] = React.useState((album && album.subtitle) || '');
  const [date, setDate] = React.useState((album && album.date) || '');
  const [desc, setDesc] = React.useState((album && album.desc) || '');
  const [err, setErr] = React.useState('');
  const isEdit = mode === 'edit';

  const submit = () => {
    if (!title.trim()) return setErr('タイトルは必須です');
    const yearMatch = String(date).match(/(\d{4})/);
    const year = yearMatch ? parseInt(yearMatch[1], 10) : new Date().getFullYear();
    if (isEdit) {
      updateConfig(d => {
        const a = d.albums.find(x => x.id === album.id);
        if (a) {
          a.title = title.trim();
          a.subtitle = subtitle.trim();
          a.date = date.trim();
          a.year = year;
          a.desc = desc.trim();
        }
      });
    } else {
      const id = newId('alb');
      updateConfig(d => {
        d.albums.unshift({
          id, title: title.trim(), subtitle: subtitle.trim(),
          date: date.trim(), year, desc: desc.trim(),
          coverPhotoId: null, photos: [],
        });
      });
    }
    onClose();
  };

  return (
    <Modal onClose={onClose}>
      <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 18, fontWeight: 500, marginBottom: 16 }}>
        {isEdit ? 'アルバムを編集' : '新しいアルバム'}

function PhotoUploaderModal({ albumId, onClose }) {
  const { config, updateConfig } = useConfig();
  const cloud = config.cloudinary || {};
  const fileRef = React.useRef(null);
  const [files, setFiles] = React.useState([]);
  const [busy, setBusy] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [err, setErr] = React.useState('');
  const [doneCount, setDoneCount] = React.useState(0);

  const ready = !!(cloud.cloudName && cloud.uploadPreset);

  const pick = () => fileRef.current && fileRef.current.click();
  const onChange = (e) => {
    setFiles(Array.from(e.target.files || []));
    setErr('');
  };

  const upload = async () => {
    if (!ready) { setErr('先に Cloudinary 設定を入力してください。'); return; }
    if (!files.length) { setErr('ファイルを選んでください。'); return; }
    setBusy(true); setErr(''); setDoneCount(0);
    try {
      for (let i = 0; i < files.length; i++) {
        setProgress(0);
        const r = await uploadToCloudinary(files[i], cloud, p => setProgress(p));
        updateConfig(d => {
          const a = d.albums.find(x => x.id === albumId);
          if (!a) return;
          if (!a.photos) a.photos = [];
          const photo = { id: newId('p'), src: r.src, date: todayShort(), caption: '' };
          a.photos.push(photo);
          if (!a.coverPhotoId) a.coverPhotoId = photo.id;
        });
        setDoneCount(i + 1);
      }
      onClose();
    } catch (e) {
      setErr(e.message || 'アップロードに失敗しました。');
    } finally {
      setBusy(false);
    }
  };

  return (
    <Modal onClose={busy ? undefined : onClose}>
      <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 18, fontWeight: 500, marginBottom: 14 }}>写真を追加</div>
      {!ready && (
        <div style={{ background: 'rgba(177,58,42,.08)', border: '1px solid rgba(177,58,42,.25)',
          color: '#7a2818', borderRadius: 10, padding: '10px 12px', fontSize: 12, marginBottom: 14, lineHeight: 1.6 }}>
          Cloudinary 設定が未入力です。設定 → Cloudinary 設定 から先に入力してください。
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" multiple onChange={onChange} style={{ display: 'none' }}/>
      <button className="btn-secondary" onClick={pick} disabled={busy} style={{ marginBottom: 14 }}>
        <Icon.Upload/> ファイルを選ぶ
      </button>
      {files.length > 0 && (
        <div style={{ fontSize: 12, color: 'var(--ink-2)', marginBottom: 14 }}>
          {files.length}枚 選択中
          {busy && (
            <div style={{ marginTop: 8 }}>
              <div className="progress-track"><div className="progress-fill" style={{ width: `${Math.round(progress * 100)}%` }}/></div>
              <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 4 }}>{doneCount} / {files.length} 完了</div>
            </div>
          )}
        </div>
      )}
      {err && <div style={{ color: '#b13a2a', fontSize: 12, marginBottom: 10 }}>{err}</div>}
      <div style={{ display: 'flex', gap: 10 }}>
        <button className="btn-secondary" onClick={onClose} disabled={busy}>キャンセル</button>
        <button className="btn-primary" onClick={upload} disabled={busy || !files.length}>
          {busy ? 'アップロード中…' : 'アップロード'}
        </button>
      </div>
    </Modal>
  );
}

function PublishModal({ onClose }) {
  const { config, replaceConfig, resetConfig } = useConfig();
  const fileRef = React.useRef(null);
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState('');
  const [err, setErr] = React.useState('');

  const onPublish = async () => {
    setBusy(true); setErr(''); setMsg('');
    try {
      await publishHTML(config);
      setMsg('Memoria.html をダウンロードしました。リポジトリのファイルを上書き → git push で公開できます。');
    } catch (e) {
      setErr(e.message || '書き出しに失敗しました');
    } finally { setBusy(false); }
  };

  const exportJSON = () => downloadJSON('memoria-config.json', config);
  const importJSON = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result));
        const merged = mergeConfig(DEFAULT_MEMORIA_CONFIG, obj);
        replaceConfig(merged);
        setMsg('設定を読み込みました。');
      } catch (er) { setErr('JSONの読み込みに失敗しました: ' + er.message); }
    };
    reader.readAsText(file);
  };

  return (
    <Modal onClose={busy ? undefined : onClose}>
      <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 18, fontWeight: 500, marginBottom: 14 }}>公開・書き出し</div>
      <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.7, marginBottom: 14 }}>
        現在の編集内容を <code style={{ background: 'var(--bg-soft)', padding: '1px 6px', borderRadius: 4 }}>Memoria.html</code> に書き出します。ダウンロード後、リポジトリの同名ファイルを上書きし <code style={{ background: 'var(--bg-soft)', padding: '1px 6px', borderRadius: 4 }}>git push</code> で公開されます。
      </div>
      <button className="btn-primary" onClick={onPublish} disabled={busy} style={{ marginBottom: 14 }}>
        <Icon.Down/> 公開用 HTML をダウンロード
      </button>
      <div style={{ height: 1, background: 'var(--line)', margin: '10px 0 14px' }}/>
      <div style={{ fontSize: 11, letterSpacing: '.12em', color: 'var(--ink-3)', textTransform: 'uppercase', marginBottom: 8 }}>設定の入出力 (JSON)</div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 8 }}>
        <button className="btn-secondary" onClick={exportJSON}>エクスポート</button>
        <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} style={{ display: 'none' }}/>
        <button className="btn-secondary" onClick={() => fileRef.current && fileRef.current.click()}>インポート</button>
      </div>
      <button className="btn-secondary" onClick={() => { if (confirm('すべての編集内容を破棄して初期状態に戻しますか？')) { resetConfig(); setMsg('初期化しました。'); } }}>
        初期状態に戻す
      </button>
      {msg && <div style={{ color: 'var(--accent)', fontSize: 12, marginTop: 12 }}>{msg}</div>}
      {err && <div style={{ color: '#b13a2a', fontSize: 12, marginTop: 12 }}>{err}</div>}
      <div style={{ marginTop: 16 }}>
        <button className="btn-secondary" onClick={onClose} disabled={busy}>閉じる</button>
      </div>
    </Modal>
  );
}

function ScreenAlbum({ albumId, go }) {
  const { config, updateConfig } = useConfig();
  const { isAdmin } = useAdmin();
  const album = config.albums.find(a => a.id === albumId) || config.albums[0];
  const [showUploader, setShowUploader] = React.useState(false);
  const [photoMenu, setPhotoMenu] = React.useState(null);
  const [confirmDeletePhoto, setConfirmDeletePhoto] = React.useState(null);

  if (!album) {
    return (
      <div className="screen-enter" style={{ height: '100%', position: 'relative', background: 'var(--bg)' }}>
        <div style={{ padding: '120px 22px', textAlign: 'center', color: 'var(--ink-3)' }}>アルバムが見つかりません。</div>
        <TabBar active="home" go={go}/>
      </div>
    );
  }

  const photos = (album.photos || []).map((p, idx) => ({ ...p, _idx: idx }));
  const cover = coverUrl(album, 'full');

  const groups = [];
  if (photos.length > 0) {
    if (photos.length <= 8) {
      groups.push({ date: album.date, items: photos });
    } else {
      const datePrefix = String(album.date).replace('通年', '2025.06');
      groups.push({ date: `${datePrefix}.10 (日)`, items: photos.slice(0, 8) });
      if (photos.length > 8)  groups.push({ date: `${datePrefix}.11 (月)`, items: photos.slice(8, 16) });
      if (photos.length > 16) groups.push({ date: `${datePrefix}.12 (火)`, items: photos.slice(16) });
    }
  }

  const removePhoto = (photoId) => {
    updateConfig(d => {
      const a = d.albums.find(x => x.id === album.id);
      if (!a) return;
      a.photos = a.photos.filter(p => p.id !== photoId);
      if (a.coverPhotoId === photoId) a.coverPhotoId = a.photos.length ? a.photos[0].id : null;
    });
  };

  const setCover = (photoId) => {
    updateConfig(d => {
      const a = d.albums.find(x => x.id === album.id);
      if (a) a.coverPhotoId = photoId;
    });
  };

  return (
    <div className="screen-enter" style={{ height: '100%', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
      <div style={{ height: '100%', overflow: 'auto', paddingBottom: 110 }}>
        <div style={{ position: 'relative', height: 360,
          background: `url(${cover}) center/cover, var(--bg-soft)` }}>
          <div style={{ position: 'absolute', inset: 0,
            background: 'linear-gradient(180deg, rgba(20,12,6,.35) 0%, rgba(20,12,6,0) 35%, rgba(20,12,6,0) 60%, rgba(245,239,230,1) 100%)' }}/>

          <div style={{ position: 'absolute', top: 60, left: 14, right: 14,
            display: 'flex', justifyContent: 'space-between' }}>
            <RoundBtn dark onClick={() => go('home')}><Icon.ChevL/></RoundBtn>
            <div style={{ display: 'flex', gap: 8 }}>
              <RoundBtn dark><Icon.Share/></RoundBtn>
              <RoundBtn dark><Icon.More/></RoundBtn>
            </div>
          </div>

          <div style={{ position: 'absolute', left: 22, right: 22, bottom: 28, color: '#fff' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5,
              fontSize: 10.5, letterSpacing: '.18em', textTransform: 'uppercase', opacity: .9, marginBottom: 6 }}>
              <Icon.Pin/>{' '}
              <EditableText value={album.subtitle} dark
                onSave={v => updateConfig(d => { const a = d.albums.find(x => x.id === album.id); if (a) a.subtitle = v; })}/>
            </div>
            <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 32, fontWeight: 500,
              lineHeight: 1.18, marginBottom: 8 }}>
              <EditableText value={album.title} dark
                onSave={v => updateConfig(d => { const a = d.albums.find(x => x.id === album.id); if (a) a.title = v; })}/>
            </div>
            <div style={{ fontSize: 12.5, opacity: .9, lineHeight: 1.6, maxWidth: 280 }}>
              <EditableText value={album.desc} dark multiline
                onSave={v => updateConfig(d => { const a = d.albums.find(x => x.id === album.id); if (a) a.desc = v; })}/>
            </div>
          </div>
        </div>

        <div style={{ padding: '6px 22px 16px', display: 'flex', alignItems: 'center', gap: 14,
          fontSize: 11.5, color: 'var(--ink-2)', letterSpacing: '.05em' }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <Icon.Calendar/>{' '}
            <EditableText value={album.date}
              onSave={v => updateConfig(d => { const a = d.albums.find(x => x.id === album.id); if (a) { a.date = v; const m = String(v).match(/(\d{4})/); if (m) a.year = parseInt(m[1], 10); } })}/>
          </span>
          <span style={{ width: 1, height: 12, background: 'var(--line-strong)' }}/>
          <span>{photos.length}枚の写真</span>
          <span style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 4, color: 'var(--accent)' }}>
            <Icon.Heart/> 12
          </span>
        </div>

        <div style={{ display: 'flex', gap: 6, padding: '0 18px 14px', overflowX: 'auto' }}>
          {['すべて','風景','人物','ハイライト'].map((t, i) => (
            <div key={t} className={'chip' + (i === 0 ? ' is-active' : '')}>{t}</div>
          ))}
        </div>

        {groups.length === 0 && (
          <div style={{ padding: '40px 22px 30px', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
            まだ写真がありません。{isAdmin ? '右下の + ボタンから追加できます。' : ''}
          </div>
        )}
        {groups.map(g => (
          <DateGroup key={g.date} date={g.date} photos={g.items} albumId={album.id} go={go}
            onPhotoLongPress={isAdmin ? (p) => setPhotoMenu(p) : undefined}/>
        ))}
      </div>
      {isAdmin && <FAB onClick={() => setShowUploader(true)} label="写真を追加"/>}
      {showUploader && <PhotoUploaderModal albumId={album.id} onClose={() => setShowUploader(false)}/>}
      {photoMenu && (
        <LongPressMenu onClose={() => setPhotoMenu(null)} items={[
          { icon: <Icon.Star/>, label: '表紙にする', onClick: () => setCover(photoMenu.id) },
          { icon: <Icon.Trash/>, label: '写真を削除', danger: true, onClick: () => setConfirmDeletePhoto(photoMenu) },
        ]}/>
      )}
      {confirmDeletePhoto && (
        <ConfirmModal title="写真を削除" message="この写真を削除しますか？(Cloudinary 上のファイルは別途削除が必要です)"
          onCancel={() => setConfirmDeletePhoto(null)}
          onConfirm={() => { removePhoto(confirmDeletePhoto.id); setConfirmDeletePhoto(null); }}/>
      )}
      <TabBar active="home" go={go}/>
    </div>
  );
}

function ScreenLightbox({ albumId, photoIndex = 0, go }) {
  const { config } = useConfig();
  const album = config.albums.find(a => a.id === albumId) || config.albums[0];
  const photos = (album && album.photos) || [];
  const [idx, setIdx] = React.useState(Math.min(photoIndex, Math.max(0, photos.length - 1)));
  const photo = photos[idx];

  if (!photo) {
    return (
      <div className="screen-enter" style={{ height: '100%', background: '#0e0a06' }}>
        <div style={{ padding: 60, textAlign: 'center', color: 'rgba(255,255,255,.7)' }}>写真がありません</div>

  return (
    <div className="screen-enter" style={{ height: '100%', position: 'relative', background: '#0e0a06', overflow: 'hidden' }}>

        background: `url(${imgUrl(photo.src, 'full')}) center/cover`, filter: 'blur(40px) saturate(.7)', opacity: .4 }}/>

        <div style={{ textAlign: 'center', color: '#fff' }}>
          <div style={{ fontSize: 10.5, letterSpacing: '.18em', opacity: .7, textTransform: 'uppercase' }}>{album.subtitle}</div>
          <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 14, fontWeight: 500, marginTop: 2 }}>{album.title}</div>

        <RoundBtn dark><Icon.More/></RoundBtn>

      <div style={{ position: 'absolute', top: 118, left: 0, right: 0, textAlign: 'center',

        fontSize: 13, color: 'rgba(255,255,255,.65)', letterSpacing: '.1em' }}>

            zIndex: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <RoundBtn dark><Icon.ChevR/></RoundBtn>

      <div style={{ position: 'absolute', left: 14, right: 14, bottom: 28, zIndex: 10 }}>
        <div style={{
          background: 'rgba(20,14,8,.55)',
          border: '1px solid rgba(255,255,255,.1)',

            { icon: <Icon.Info/>,  label: '詳細' },

// YEARS
// ─────────────────────────────────────────────────────────
function ScreenYears({ go }) {
  const { config } = useConfig();
  const albums = config.albums;
  const yearMap = new Map();
  albums.forEach(a => {
    if (!yearMap.has(a.year)) yearMap.set(a.year, { y: a.year, count: 0, albums: [] });
    const e = yearMap.get(a.year);
    e.count += a.photos ? a.photos.length : 0;
    e.albums.push(a);
  });
  const years = [...yearMap.values()].sort((a,b) => b.y - a.y);

  return (
    <div className="screen-enter" style={{ height: '100%', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
      <div style={{ height: '100%', overflow: 'auto', paddingBottom: 110 }}>
        <div style={{ padding: '64px 22px 8px' }}>
          <div style={{ fontSize: 10.5, letterSpacing: '.22em', textTransform: 'uppercase',
            color: 'var(--ink-3)', marginBottom: 4 }}>By Year</div>
          <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 30, fontWeight: 500,
            color: 'var(--ink)' }}>年で振り返る</div>
          <div style={{ fontSize: 12.5, color: 'var(--ink-2)', marginTop: 8, lineHeight: 1.7 }}>
            写真は時間と一緒に。<br/>上から新しい順に並んでいます。
          </div>
        </div>

        {years.map(({ y, count, albums: list }, i) => (
          <div key={y} style={{ padding: '22px 18px 8px' }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', padding: '0 4px 12px' }}>
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 44, fontWeight: 500,
                color: 'var(--ink)', lineHeight: 1, letterSpacing: '.01em' }}>{y}</div>
              <div style={{ fontSize: 11.5, color: 'var(--ink-3)', letterSpacing: '.05em' }}>
                {list.length}冊 · {count}枚
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, overflowX: 'auto', padding: '0 4px 4px' }}>
              {list.map(a => (
                <div key={a.id} className="tap" onClick={() => go('album', { albumId: a.id })}
                  style={{ minWidth: 156, borderRadius: 14, overflow: 'hidden', flexShrink: 0,
                    background: 'var(--bg-elev)', border: '1px solid var(--line)',
                    boxShadow: 'var(--shadow-1)' }}>
                  <div style={{ aspectRatio: '4 / 5',
                    background: `url(${coverUrl(a, 'full')}) center/cover, var(--bg-soft)` }}/>
                  <div style={{ padding: '8px 11px 11px' }}>
                    <div style={{ fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase',
                      color: 'var(--ink-3)', marginBottom: 2 }}>{a.date}</div>
                    <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 13.5,
                      fontWeight: 500, color: 'var(--ink)' }}>{a.title}</div>
                  </div>
                </div>
              ))}
              <div className="tap" onClick={() => go('home')} style={{ minWidth: 90, display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                borderRadius: 14, border: '1px dashed var(--line-strong)',
                color: 'var(--ink-3)', fontSize: 11.5, letterSpacing: '.05em', gap: 6 }}>
                <Icon.ChevR/> すべて
              </div>
            </div>
            {i < years.length - 1 && <div style={{ height: 1, background: 'var(--line)', marginTop: 22 }}/>}
          </div>
        ))}
      </div>
      <TabBar active="years" go={go}/>
    </div>
  );
}

  const { config } = useConfig();
  const albums = config.albums;
  const recent = ['沖縄','おばあちゃん','京都','花火'];
  const all = [];
  albums.forEach(a => {
    (a.photos || []).forEach((p, idx) => {
      all.push({ ...p, _albumId: a.id, _photoIndex: idx });
    });
  });
  const allSliced = all.slice(0, 18);
  const totalPhotos = totalPhotosOf(albums);

  const findAlbum = (...ids) => {
    for (const id of ids) {
      const a = albums.find(x => x.id === id);
      if (a) return a;
    }
    return albums[0];
  };
  const cats = [
    { l: '人物', n: 41, a: findAlbum('family', 'daily') },
    { l: '風景', n: 64, a: findAlbum('kyoto', 'hokkaido') },
    { l: '海',   n: 32, a: findAlbum('okinawa', 'hawaii') },
    { l: '街',   n: 28, a: findAlbum('paris') },
  ].filter(c => c.a);

  return (
    <div className="screen-enter" style={{ height: '100%', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
      <div style={{ height: '100%', overflow: 'auto', paddingBottom: 110 }}>
        <div style={{ padding: '64px 22px 8px' }}>
          <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 28, fontWeight: 500, color: 'var(--ink)' }}>さがす</div>
        </div>

        <div style={{ padding: '10px 18px 16px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8,
            height: 46, padding: '0 14px',
            background: 'var(--bg-elev)', border: '1px solid var(--line)',
            borderRadius: 14, boxShadow: 'var(--shadow-1)' }}>
            <Icon.Search style={{ color: 'var(--ink-3)' }}/>
            <input placeholder="場所、人、できごと..." style={{
              flex: 1, border: 'none', outline: 'none', background: 'transparent',
              fontSize: 14, color: 'var(--ink)', fontFamily: 'inherit' }}/>
          </div>
        </div>

        <div style={{ padding: '4px 22px 10px', fontSize: 10.5, letterSpacing: '.18em',
          textTransform: 'uppercase', color: 'var(--ink-3)' }}>最近の検索</div>
        <div style={{ display: 'flex', gap: 6, padding: '0 18px 22px', overflowX: 'auto' }}>
          {recent.map(t => <div key={t} className="chip">{t}</div>)}
        </div>

        <div style={{ padding: '0 22px 12px', fontSize: 10.5, letterSpacing: '.18em',
          textTransform: 'uppercase', color: 'var(--ink-3)' }}>カテゴリ</div>
        <div style={{ padding: '0 18px 22px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {cats.map(c => (
            <div key={c.l} className="tap" onClick={() => go('album', { albumId: c.a.id })}
              style={{ position: 'relative', borderRadius: 14, overflow: 'hidden',
                aspectRatio: '16 / 9',
                background: `url(${coverUrl(c.a, 'full')}) center/cover, var(--bg-soft)`,
                boxShadow: 'var(--shadow-1)' }}>
              <div style={{ position: 'absolute', inset: 0,
                background: 'linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(20,12,6,.7) 100%)' }}/>
              <div style={{ position: 'absolute', left: 12, bottom: 9, color: '#fff' }}>
                <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 16, fontWeight: 500 }}>{c.l}</div>
                <div style={{ fontSize: 10.5, opacity: .85 }}>{c.n}枚</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ padding: '0 22px 10px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 10.5, letterSpacing: '.18em', textTransform: 'uppercase',
            color: 'var(--ink-3)' }}>すべての写真</div>
          <div style={{ fontSize: 11, color: 'var(--accent)' }}>{totalPhotos}枚</div>
        </div>
        <div style={{ padding: '0 14px', display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 4 }}>
          {allSliced.map(p => (
            <div key={p.id} className="tap"
              onClick={() => go('lightbox', { albumId: p._albumId, photoIndex: p._photoIndex })}
              style={{ aspectRatio: '1 / 1', borderRadius: 4,
                background: `url(${imgUrl(p.src, 'thumb')}) center/cover, var(--bg-soft)` }}/>
          ))}
        </div>
      </div>
      <TabBar active="search" go={go}/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// PROFILE
// ─────────────────────────────────────────────────────────
function SettingRow({ icon, label, detail, onClick }) {
  return (
    <div className="tap" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px' }}>
      <div style={{ width: 32, height: 32, borderRadius: 10, background: 'rgba(184,146,101,.14)',
        color: 'var(--accent)',
        display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{icon}</div>
      <div style={{ flex: 1, fontSize: 14, color: 'var(--ink)' }}>{label}</div>
      <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>{detail}</div>
      <Icon.ChevR style={{ color: 'var(--ink-3)' }}/>
    </div>
  );
}

function SettingsGroup({ title, children }) {
  const arr = React.Children.toArray(children);
  return (
    <div style={{ padding: '0 18px 22px' }}>
      <div style={{ fontSize: 10.5, letterSpacing: '.18em', textTransform: 'uppercase',
        color: 'var(--ink-3)', padding: '0 6px 8px' }}>{title}</div>
      <div style={{ borderRadius: 16, overflow: 'hidden', background: 'var(--bg-elev)',
        border: '1px solid var(--line)', boxShadow: 'var(--shadow-1)',
        display: 'flex', flexDirection: 'column' }}>
        {arr.map((c, i) => (
          <div key={i} style={{ borderTop: i ? '1px solid var(--line)' : 'none' }}>{c}</div>
        ))}
      </div>
    </div>
  );
}

function ScreenProfile({ go }) {
  const { config, updateConfig } = useConfig();
  const { isAdmin, logout } = useAdmin();
  const albums = config.albums;
  const totalPhotos = totalPhotosOf(albums);
  const [showAdminLogin, setShowAdminLogin] = React.useState(false);
  const [showFamilyPwChange, setShowFamilyPwChange] = React.useState(false);
  const [showAdminPwChange, setShowAdminPwChange] = React.useState(false);
  const [showCloud, setShowCloud] = React.useState(false);
  const [showPublish, setShowPublish] = React.useState(false);

  return (
    <div className="screen-enter" style={{ height: '100%', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
      <div style={{ height: '100%', overflow: 'auto', paddingBottom: 110 }}>
        <div style={{ padding: '64px 22px 26px', textAlign: 'center' }}>
          <div style={{ width: 74, height: 74, borderRadius: 999, margin: '0 auto 14px',
            background: 'linear-gradient(135deg, #c9a065 0%, #7a4f2c 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontFamily: "'Cormorant Garamond',serif", fontSize: 30, fontWeight: 500,
            boxShadow: 'var(--shadow-2)', border: '3px solid var(--bg-elev)' }}>
            {config.profile.userInitial || (config.profile.userName || 'A').slice(0, 1)}
          </div>
          <div style={{ fontFamily: "'Shippori Mincho',serif", fontSize: 22, fontWeight: 500, color: 'var(--ink)' }}>
            <EditableText value={config.profile.userName}
              onSave={v => updateConfig(d => { d.profile.userName = v; d.profile.userInitial = (v || 'A').slice(0,1).toUpperCase(); })}/>
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 4, letterSpacing: '.06em',
            display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <Icon.Lock/>{' '}
            <EditableText value={config.profile.userRole} onSave={v => updateConfig(d => { d.profile.userRole = v; })}/>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
          margin: '0 18px 26px', padding: '14px 0',
          background: 'var(--bg-elev)', border: '1px solid var(--line)',
          borderRadius: 16, boxShadow: 'var(--shadow-1)' }}>
          {[
            { n: totalPhotos, l: '写真' },
            { n: albums.length, l: 'アルバム' },
            { n: 4, l: 'みんな' },
          ].map((s, i, arr) => (
            <div key={s.l} style={{ textAlign: 'center', position: 'relative' }}>
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 26, fontWeight: 500,
                color: 'var(--ink)', lineHeight: 1 }}>{s.n}</div>
              <div style={{ fontSize: 10.5, color: 'var(--ink-3)', marginTop: 4, letterSpacing: '.1em' }}>{s.l}</div>
              {i < arr.length - 1 && <div style={{ position: 'absolute', right: 0, top: '20%',
                bottom: '20%', width: 1, background: 'var(--line)' }}/>}
            </div>
          ))}
        </div>

        <SettingsGroup title="家族・プライバシー">
          <SettingRow icon={<Icon.User/>} label="みんなの招待状" detail="4名がアクセス中"/>
          <SettingRow icon={<Icon.Lock/>} label="合言葉の変更" detail={`最終: ${config.auth.passphraseUpdatedAt || ''}`}
            onClick={() => setShowFamilyPwChange(true)}/>
          <SettingRow icon={<Icon.Sparkle/>} label="通知" detail="ON"/>
        </SettingsGroup>

        <SettingsGroup title="表示と保存">
          <SettingRow icon={<Icon.Down/>} label="画質" detail="オリジナル"/>
          <SettingRow icon={<Icon.Down/>} label="ダウンロード許可" detail="家族のみ"/>
          <SettingRow icon={<Icon.Info/>} label="このサイトについて" detail="v.1.1"/>
        </SettingsGroup>

        {isAdmin && (
          <SettingsGroup title="管理者メニュー">
            <SettingRow icon={<Icon.Camera/>} label="Cloudinary 設定"
              detail={config.cloudinary.cloudName ? '設定済' : '未設定'}
              onClick={() => setShowCloud(true)}/>
            <SettingRow icon={<Icon.Lock/>} label="管理者パスワードの変更" detail=""
              onClick={() => setShowAdminPwChange(true)}/>
            <SettingRow icon={<Icon.Down/>} label="公開・書き出し" detail="HTML / JSON"
              onClick={() => setShowPublish(true)}/>
            <SettingRow icon={<Icon.Logout/>} label="管理者ログアウト" detail=""
              onClick={() => { logout(); }}/>
          </SettingsGroup>
        )}

        <div style={{ padding: '8px 18px 18px' }}>
          <div className="tap" onClick={() => {
            try { sessionStorage.removeItem(UNLOCK_KEY); } catch (e) {}
            go('lock');
          }} style={{
            height: 48, borderRadius: 14, background: 'var(--bg-elev)',
            border: '1px solid var(--line)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--accent)', fontSize: 14, fontWeight: 500 }}>
            ロックする
          </div>
        </div>

        {!isAdmin && (
          <div style={{ padding: '0 18px 24px' }}>
            <div className="tap" onClick={() => setShowAdminLogin(true)} style={{
              height: 44, borderRadius: 12, background: 'transparent',
              border: '1px dashed var(--line-strong)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'var(--ink-3)', fontSize: 13, letterSpacing: '.04em' }}>
              管理者でログイン
            </div>
          </div>
        )}

        <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--ink-3)', paddingBottom: 16,
          fontFamily: "'Cormorant Garamond',serif", fontStyle: 'italic', letterSpacing: '.08em' }}>
          <EditableText value={config.site.footer} onSave={v => updateConfig(d => { d.site.footer = v; })}/>
        </div>
      </div>
      {showAdminLogin && <AdminLoginModal onClose={() => setShowAdminLogin(false)}/>}
      {showFamilyPwChange && <PassphraseChangeModal kind="family" onClose={() => setShowFamilyPwChange(false)}/>}
      {showAdminPwChange && <PassphraseChangeModal kind="admin" onClose={() => setShowAdminPwChange(false)}/>}
      {showCloud && <CloudinarySettingsModal onClose={() => setShowCloud(false)}/>}
      {showPublish && <PublishModal onClose={() => setShowPublish(false)}/>}
      <TabBar active="profile" go={go}/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// APP ROUTER
// ─────────────────────────────────────────────────────────
function AppRouter() {
  const { isAdmin, logout } = useAdmin();
  const initialScreen = (() => {
    try { return sessionStorage.getItem(UNLOCK_KEY) === '1' ? 'home' : 'lock'; }
    catch (e) { return 'lock'; }
  })();
  const [nav, setNav] = React.useState({ screen: initialScreen });
  const go = (screen, extra = {}) => setNav({ screen, ...extra });
  const { screen, albumId, photoIndex } = nav;

  let view;
  switch (screen) {
    case 'lock':           view = <ScreenLock go={go}/>; break;
    case 'home':           view = <ScreenHome go={go}/>; break;
    case 'albums-list':    view = <ScreenAlbumsList go={go}/>; break;
    case 'album':          view = <ScreenAlbum albumId={albumId} go={go}/>; break;
    case 'lightbox':       view = <ScreenLightbox albumId={albumId} photoIndex={photoIndex} go={go}/>; break;
    case 'years':          view = <ScreenYears go={go}/>; break;
    case 'search':         view = <ScreenSearch go={go}/>; break;
    case 'profile':        view = <ScreenProfile go={go}/>; break;
    default:               view = <ScreenHome go={go}/>;
  }

  const showAdminBar = isAdmin && screen !== 'lock';

  return (
    <div className="phone-screen" key={`${screen}-${albumId || ''}-${photoIndex == null ? '' : photoIndex}`}
      style={{ width: '100%', maxWidth: 430, margin: '0 auto', height: '100dvh',
        overflow: 'hidden', position: 'relative' }}>
      <AdminBar isAdmin={showAdminBar} onLogout={logout}/>
      <div style={{ position: 'absolute', top: showAdminBar ? 30 : 0, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}>
        {view}
      </div>
    </div>
  );
}

function App() {
  return (
    <ConfigProvider>
      <AdminProvider>
        <AppRouter/>
      </AdminProvider>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
